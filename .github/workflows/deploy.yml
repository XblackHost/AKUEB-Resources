name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Application
        # This compiles the TypeScript into pure JS and fixes the base URL path automatically
        run: npx vite build --base=/AKUEB-Resources/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload compiled artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We upload the translated production folder, NOT the raw code
          path: 'dist/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
