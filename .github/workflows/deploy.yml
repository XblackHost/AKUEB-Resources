name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix absolute asset paths for GitHub Pages
        run: |
          # This converts source paths starting with '/' to '.' so they load relatively
          sed -i 's|href="/|href="./|g' artifacts/akueb-help/index.html
          sed -i 's|src="/|src="./|g' artifacts/akueb-help/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'artifacts/akueb-help/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
