kind = "web"
previewPath = "/"
title = "AKUEB Students Help"
version = "1.0.0"
id = "artifacts/akueb-help"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21009

[services.development]
run = "pnpm --filter @workspace/akueb-help run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/akueb-help", "run", "build" ]
publicDir = "artifacts/akueb-help/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21009"
BASE_PATH = "/"
